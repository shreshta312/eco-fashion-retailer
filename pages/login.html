<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Eco Fashion Retailer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>
  <header class="site-header">
    <a href="../index.html" class="logo">
      <img src="../assets/images/logo/logo.jpg" alt="Eco Fashion Retailer Logo" />
      <span>Eco Fashion Retailer</span>
    </a>

    <nav class="navbar" id="navbar">
      <a href="../index.html">Home</a>
      <a href="../index.html#features">Features</a>
      <a href="../index.html#categories">Categories</a>
      <a href="../index.html#products">Products</a>
      <a href="../index.html#reviews">Reviews</a>
    </nav>

    <div class="header-icons">
      <button id="menu-btn" aria-label="Open Menu">
        <i class="fas fa-bars"></i>
      </button>

      <button id="search-btn" aria-label="Open Search">
        <i class="fas fa-search"></i>
      </button>

      <a href="cart.html" class="cart-link">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
      </a>

      <a href="login.html">
        <i class="fas fa-user"></i>
      </a>
    </div>

    <form class="search-form" id="search-form">
      <input type="text" id="search-input" placeholder="Search sustainable products..." />
      <button type="submit">
        <i class="fas fa-search"></i>
      </button>
      <div class="search-results" id="search-results"></div>
    </form>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-icon">
        <i class="fas fa-leaf"></i>
      </div>

      <h1>Welcome Back</h1>
      <p>Login to continue your sustainable shopping journey.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="auth-btn">
          Login
        </button>
      </form>

      <p class="auth-switch">
        New user?
        <a href="register.html">Create an account</a>
      </p>
    </section>
  </main>

  <script src="../data/products.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
